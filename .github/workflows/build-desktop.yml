# Connect AI Desktop — 맥(.dmg) · 윈도우(.exe) 설치파일 자동 빌드.
# 트리거: 'desktop-v*' 태그 푸시 또는 수동 실행(Actions 탭 > Run workflow).
# 결과: 각 OS 설치파일이 Actions 아티팩트 + (태그면) GitHub Release 에 첨부됨.
name: Build Connect AI Desktop

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # desktop/ 만 체크아웃 — 자체 완결(agents.ts·plaza.ts 포함)이라 루트 불필요.
      # 익스텐션의 긴 경로 에셋(Windows 260자 초과)도 회피.
      - uses: actions/checkout@v4
        with:
          sparse-checkout: desktop
          sparse-checkout-cone-mode: true
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        working-directory: desktop
        run: npm install

      - name: Bundle (esbuild)
        working-directory: desktop
        run: npm run build

      - name: Package installer (electron-builder)
        working-directory: desktop
        run: npx electron-builder --publish never
        # GH_TOKEN 일부러 제외 — electron-builder 가 GitHub 퍼블리시를 시도하다
        # sparse-checkout 환경에서 repo 감지 실패로 크래시(provider null)하는 것 방지.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: connect-ai-${{ matrix.os }}
          path: |
            desktop/release/*.dmg
            desktop/release/*.exe
          if-no-files-found: warn

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/release/*.dmg
            desktop/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
